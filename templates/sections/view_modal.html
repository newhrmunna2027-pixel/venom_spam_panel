<div id="view-target-modal" class="fixed inset-0 hidden items-center justify-center bg-black/90 backdrop-blur-sm z-[100]">
    <div class="bg-[#0f111a] border border-white/10 w-full max-w-[26rem] rounded-[2.5rem] shadow-2xl relative overflow-hidden p-6 mx-4">
        <button onclick="document.getElementById('view-target-modal').classList.replace('flex', 'hidden')" class="absolute top-5 right-5 text-gray-500 hover:text-white bg-gray-800 p-2 rounded-full transition z-20"><i class="fas fa-times"></i></button>
        <h3 class="text-xl font-black text-white uppercase tracking-widest mb-6">TARGET PROFILE</h3>
        
        <div id="v-ff-preview" class="relative bg-[#13151f] rounded-[2.2rem] overflow-hidden border border-white/5 shadow-lg min-h-[250px] flex items-center justify-center">
            <!-- Data dynamically loaded via JS -->
        </div>

        <div class="mt-4 flex justify-between items-center text-[10px] text-gray-500 font-bold px-2">
            <div>Added Time: <span id="v-added-time" class="text-emerald-400"></span></div>
        </div>

        <div class="mt-3 bg-[#161925] border border-white/5 rounded-2xl p-4 text-center shadow-inner">
            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-1">Time Remaining</span>
            <div id="v-timer" class="text-xl font-black text-rose-500 font-mono">00:00:00</div>
        </div>
    </div>
</div>
