<div id="add-modal" class="fixed inset-0 hidden items-center justify-center bg-black/95 backdrop-blur-sm z-[300]">
    <div class="bg-[#0f111a] border border-white/10 w-full max-w-[26rem] rounded-[2.5rem] shadow-2xl relative overflow-hidden p-6 max-h-[95vh] overflow-y-auto mx-4 font-sans">
        
        <!-- Glass Scanner Loading Overlay -->
        <div id="check-loading-overlay" class="hidden absolute inset-0 bg-black/85 backdrop-blur-md flex flex-col items-center justify-center z-50 rounded-[2.5rem] transition-all duration-300">
            <div class="relative w-20 h-20 mb-4 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border-4 border-indigo-500/10"></div>
                <div class="absolute inset-0 rounded-full border-4 border-t-indigo-400 border-r-indigo-400 animate-spin"></div>
                <i class="fas fa-crosshairs text-indigo-400 text-3xl animate-pulse"></i>
            </div>
            <p class="text-sm font-['Orbitron'] font-black text-white uppercase tracking-widest animate-pulse">SCANNING DATABASE...</p>
            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">Connecting to tracking server...</p>
        </div>

        <!-- Close Button -->
        <button onclick="closeAddTargetModal()" class="absolute top-5 right-5 text-gray-500 hover:text-white bg-gray-800/40 p-2 rounded-full transition duration-300 z-20"><i class="fas fa-times"></i></button>
        <h3 class="text-xl font-['Orbitron'] font-black text-white uppercase tracking-widest mb-6 glow-text text-center animate-pulse" id="add-target-title">ADD NEW TARGET</h3>

        <div class="space-y-4">
            <!-- Inputs -->
            <div id="add-target-inputs" class="space-y-4">
                
                <!-- Custom Duration Dropdown -->
                <div class="relative w-full" id="duration-dropdown-wrapper">
                    <input type="hidden" id="t-duration" value="1 day">
                    <button type="button" onclick="toggleCustomDropdown('duration-menu')" class="w-full bg-[#161925]/90 border border-white/10 rounded-2xl p-4 text-sm font-bold text-indigo-400 outline-none flex justify-between items-center transition" id="duration-trigger">
                        <span>Duration: 1 Day</span>
                        <i class="fas fa-chevron-down text-xs transition-transform duration-300" id="duration-arrow"></i>
                    </button>
                    <!-- Custom options menu list -->
                    <div id="duration-menu" class="hidden absolute top-full left-0 right-0 mt-2 bg-[#121421]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl z-50 overflow-hidden flex flex-col font-sans transition-all duration-300">
                        <button type="button" onclick="selectCustomOption('duration', '1 day', 'Duration: 1 Day')" class="px-4 py-3.5 hover:bg-indigo-500/15 text-left text-sm font-bold text-gray-300 hover:text-white transition flex justify-between items-center w-full">
                            <span>Duration: 1 Day</span>
                            <i class="fas fa-check text-xs text-indigo-400 hidden check-icon" data-val="1 day"></i>
                        </button>
                        <button type="button" onclick="selectCustomOption('duration', '7 day', 'Duration: 7 Days')" class="px-4 py-3.5 hover:bg-indigo-500/15 text-left text-sm font-bold text-gray-300 hover:text-white transition flex justify-between items-center w-full border-t border-white/5">
                            <span>Duration: 7 Days</span>
                            <i class="fas fa-check text-xs text-indigo-400 hidden check-icon" data-val="7 day"></i>
                        </button>
                        <button type="button" onclick="selectCustomOption('duration', '30 day', 'Duration: 30 Days')" class="px-4 py-3.5 hover:bg-indigo-500/15 text-left text-sm font-bold text-gray-300 hover:text-white transition flex justify-between items-center w-full border-t border-white/5">
                            <span>Duration: 30 Days</span>
                            <i class="fas fa-check text-xs text-indigo-400 hidden check-icon" data-val="30 day"></i>
                        </button>
                        <button type="button" onclick="selectCustomOption('duration', 'permanent', 'Duration: Permanent')" class="px-4 py-3.5 hover:bg-indigo-500/15 text-left text-sm font-bold text-gray-300 hover:text-white transition flex justify-between items-center w-full border-t border-white/5">
                            <span>Duration: Permanent</span>
                            <i class="fas fa-check text-xs text-indigo-400 hidden check-icon" data-val="permanent"></i>
                        </button>
                    </div>
                </div>

                <input type="number" id="t-uid" placeholder="Enter Target UID" class="w-full bg-[#161925]/90 border border-white/10 rounded-2xl p-3.5 text-base font-bold text-white outline-none focus:border-indigo-400/50 placeholder-gray-600 transition">
                <input type="text" id="t-reason" placeholder="Enter Reason (Optional)" class="w-full bg-[#161925]/90 border border-white/10 rounded-2xl p-3.5 text-sm font-bold text-white outline-none focus:border-indigo-400/50 placeholder-gray-600 transition">
            </div>
            
            <div id="t-existing-warning" class="hidden items-center justify-between bg-rose-500/10 border border-rose-500/20 rounded-2xl p-3">
                <span class="text-rose-500 text-xs font-black uppercase tracking-widest flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> Target Already Active</span>
                <button id="t-existing-view-btn" class="bg-rose-600 hover:bg-rose-500 text-white text-[10px] font-black p-2.5 rounded-xl transition shadow-md"><i class="fas fa-eye text-sm"></i></button>
            </div>

            <!-- Free Fire Live Preview Card (🚀 Redesigned to be highly compact for Mobile view with zero scroll) -->
            <div id="t-ff-preview" class="hidden relative bg-[#161825]/90 border border-indigo-500/30 rounded-[2.2rem] mt-1 shadow-2xl">
                
                <!-- Banner (🚀 Reduced height from h-28 to h-20) -->
                <div class="h-20 w-full relative border-b border-white/5 bg-[#1a1d2e] rounded-t-[2.2rem] overflow-hidden">
                    <img id="ff-banner" src="" class="w-full h-full object-cover opacity-80">
                    <div class="absolute top-2.5 right-3 text-white text-[9px] font-black flex items-center gap-1 z-10 bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg border border-white/5">
                        <i class="fas fa-thumbs-up text-indigo-400"></i> <span id="ff-likes">0</span>
                    </div>
                </div>

                <!-- Floating Avatar Container (🚀 Scaled down to w-14 h-14 to fit mobile beautifully) -->
                <div class="absolute top-[54px] left-1/2 transform -translate-x-1/2 z-20">
                    <div class="w-14 h-14 rounded-2xl bg-[#11131a] p-0.5 border-[3px] border-indigo-500 shadow-[0_0_20px_rgba(99,102,241,0.45)] relative">
                        <div class="w-full h-full rounded-xl overflow-hidden">
                            <img id="ff-avatar" src="" class="w-full h-full object-cover">
                        </div>
                        <span class="absolute -bottom-1.5 left-1/2 transform -translate-x-1/2 bg-indigo-500 text-white font-black text-[8px] px-1.5 py-0.5 rounded-full shadow whitespace-nowrap z-30">
                            Lv.<span id="ff-level">0</span>
                        </span>
                    </div>
                </div>

                <!-- Profile details (🚀 Reduced top padding to pt-10 and tight spacing) -->
                <div class="pt-10 px-5 pb-4 bg-[#0f111a]/95 text-center rounded-b-[2.2rem]">
                    <h4 id="ff-name" class="text-base font-black text-white game-font truncate max-w-[240px] mx-auto drop-shadow-md">꧁ˢʰᵃᵒʷ➳2.0</h4>
                    <div class="text-indigo-400 text-[10px] font-mono font-bold mt-0.5 tracking-widest bg-indigo-500/10 border border-indigo-500/20 px-2 py-0.5 rounded-lg inline-block shadow-inner cursor-pointer" onclick="window.copyToClipboard(this.innerText.split(' ')[1], this)">
                        UID: <span id="ff-uid-display">11825435633</span>
                    </div>

                    <div class="grid grid-cols-2 gap-y-2.5 text-[10px] text-gray-400 font-bold px-1 mt-4 border-t border-white/5 pt-3">
                        <div class="flex items-center gap-1 text-gray-500"><i class="fas fa-shield-alt text-indigo-500/70 text-xs"></i> Guild Name</div>
                        <div class="text-right text-indigo-400 game-font truncate" id="ff-guild">No Guild</div>
                        
                        <div class="flex items-center gap-1 text-gray-500"><i class="fas fa-fingerprint text-indigo-500/70 text-xs"></i> Guild ID</div>
                        <div class="text-right text-white font-mono cursor-pointer hover:text-indigo-400 truncate" id="ff-guild-id" onclick="window.copyToClipboard(this.innerText, this)">N/A</div>

                        <div class="flex items-center gap-1 text-gray-500"><i class="fas fa-crown text-cyan-500/70 text-xs"></i> Leader</div>
                        <div class="text-right text-cyan-400 font-mono cursor-pointer hover:underline truncate" id="ff-leader" onclick="viewGenericProfile(this.innerText, 'Leader Profile')">N/A</div>
                        
                        <div class="flex items-center gap-1 text-gray-500"><i class="fas fa-globe text-indigo-500/70 text-xs"></i> Region</div>
                        <div class="text-right text-gray-300" id="ff-region">BD</div>
                        
                        <div class="flex items-center gap-1 text-gray-500"><i class="fas fa-calendar-alt text-emerald-500/70 text-xs"></i> Created</div>
                        <div class="text-right text-gray-300 font-mono" id="ff-create">N/A</div>
                        
                        <div class="flex items-center gap-1 text-gray-500"><i class="fas fa-clock text-rose-500/70 text-xs"></i> Last Login</div>
                        <div class="text-right text-emerald-400 font-mono" id="ff-login">N/A</div>
                    </div>

                    <div id="ff-signature" class="mt-4 bg-black/60 p-2.5 rounded-xl text-[10px] font-bold border-l-2 border-indigo-500 text-center ff-sig-font w-full break-words whitespace-normal overflow-hidden shadow-inner text-gray-300 border border-white/5">
                        No Signature
                    </div>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="mt-4" id="add-modal-footer">
                <button id="btn-check-uid" onclick="checkUIDProfile()" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-black py-4 rounded-2xl text-sm uppercase tracking-wider transition duration-300 shadow-[0_4px_15px_rgba(99,102,241,0.2)]">
                    Check Profile
                </button>

                <div id="add-modal-actions" class="hidden flex gap-4">
                    <button onclick="resetAddTargetModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest transition duration-300 border border-white/5">
                        Cancel
                    </button>
                    <button id="btn-attack-target" onclick="submitTargetData()" class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest transition duration-300 shadow-[0_4px_15px_rgba(16,185,129,0.25)]">
                        Attack Target
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🚀 GLOBAL REUSABLE CUSTOM DROPDOWN SELECTOR ENGINE
    window.toggleCustomDropdown = function(menuId) {
        const menu = document.getElementById(menuId);
        const arrow = document.getElementById(menuId.replace('-menu', '-arrow'));
        if(menu) {
            const isOpen = !menu.classList.contains('hidden');
            document.querySelectorAll('[id$="-menu"]').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('[id$="-arrow"]').forEach(a => a.classList.remove('rotate-180'));
            if(!isOpen) {
                menu.classList.remove('hidden');
                if(arrow) arrow.classList.add('rotate-180');
                
                let valElementId = menuId === 'duration-menu' ? 't-duration' : 'um-role';
                let hiddenInput = document.getElementById(valElementId);
                if(hiddenInput) {
                    const hiddenInputVal = hiddenInput.value;
                    menu.querySelectorAll('.check-icon').forEach(icon => {
                        if(icon.getAttribute('data-val') === hiddenInputVal) {
                            icon.classList.remove('hidden');
                        } else {
                            icon.classList.add('hidden');
                        }
                    });
                }
            }
        }
    };

    window.selectCustomOption = function(type, val, label) {
        if(type === 'duration') {
            document.getElementById('t-duration').value = val;
            document.getElementById('duration-trigger').querySelector('span').innerText = label;
            toggleCustomDropdown('duration-menu');
        } else if(type === 'role') {
            document.getElementById('um-role').value = val;
            document.getElementById('role-trigger').querySelector('span').innerText = label;
            toggleCustomDropdown('role-menu');
        }
    };

    if (!window.customDropdownClickBound) {
        window.customDropdownClickBound = true;
        document.addEventListener('click', function(e) {
            if(!e.target.closest('#duration-dropdown-wrapper') && !e.target.closest('#role-dropdown-wrapper')) {
                document.querySelectorAll('[id$="-menu"]').forEach(m => m.classList.add('hidden'));
                document.querySelectorAll('[id$="-arrow"]').forEach(a => a.classList.remove('rotate-180'));
            }
        });
    }

    window.openAddTargetModal = function() {
        resetAddTargetModal();
        document.getElementById('add-modal').classList.replace('hidden', 'flex');
    };

    window.closeAddTargetModal = function() {
        document.getElementById('add-modal').classList.replace('flex', 'hidden');
    };

    window.resetAddTargetModal = function() {
        document.getElementById('t-uid').value = '';
        document.getElementById('t-reason').value = '';
        document.getElementById('t-uid').disabled = false;
        
        // Reset Custom Dropdown to default option (1 day)
        document.getElementById('t-duration').value = '1 day';
        document.getElementById('duration-trigger').querySelector('span').innerText = 'Duration: 1 Day';
        
        document.getElementById('add-target-inputs').classList.remove('hidden');
        document.getElementById('t-ff-preview').classList.add('hidden');
        document.getElementById('t-existing-warning').classList.replace('flex', 'hidden');
        
        document.getElementById('btn-check-uid').classList.remove('hidden');
        document.getElementById('btn-check-uid').disabled = false;
        document.getElementById('btn-check-uid').innerText = "Check Profile";
        
        document.getElementById('add-modal-actions').classList.replace('flex', 'hidden');
        document.getElementById('check-loading-overlay').classList.add('hidden');
    };

    window.checkUIDProfile = async function() {
        const uid = document.getElementById('t-uid').value.trim();
        if(!uid || uid.length < 5) {
            showPopup("Invalid UID", "Please enter a valid Player UID.", "error");
            return;
        }

        const loader = document.getElementById('check-loading-overlay');
        const btnCheck = document.getElementById('btn-check-uid');
        
        loader.classList.remove('hidden');
        btnCheck.disabled = true;

        await new Promise(resolve => setTimeout(resolve, 1000));

        const targetsData = window.allTargets || [];
        let existingTarget = targetsData.find(t => String(t.uid) === String(uid));

        try {
            let res = await fetch('/api/fetch_profile', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({uid: uid, save: true, force: true}) 
            });
            
            if (!res.ok) {
                throw new Error(`HTTP Error Status: ${res.status}`);
            }

            let d = await res.json();
            loader.classList.add('hidden');

            if (d.success) {
                const basic = d.data.basicInfo || {};
                const clan = d.data.clanBasicInfo || {};
                const social = d.data.socialInfo || {};
                
                document.getElementById('ff-uid-display').innerText = uid;
                document.getElementById('ff-name').innerText = basic.nickname || 'Unknown';
                document.getElementById('ff-level').innerText = basic.level || 0;
                document.getElementById('ff-likes').innerText = basic.liked || 0;
                document.getElementById('ff-guild').innerText = clan.clanName || "No Guild";
                document.getElementById('ff-guild-id').innerText = clan.clanId || "N/A";
                document.getElementById('ff-leader').innerText = clan.captainId || "N/A";
                document.getElementById('ff-region').innerText = basic.region || 'N/A';
                document.getElementById('ff-create').innerText = formatDateTime(basic.createAt);
                document.getElementById('ff-login').innerText = formatDateTime(basic.lastLoginAt);
                document.getElementById('ff-signature').innerHTML = parseFFSignature(social.signature || "No Bio Available");

                let hPicId = basic.headPic || "902000003";
                let bannerId = basic.bannerId || "901000001";
                document.getElementById('ff-avatar').src = `https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/${hPicId}.png`;
                document.getElementById('ff-banner').src = `https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/${bannerId}.png`;
                
                document.getElementById('add-target-inputs').classList.add('hidden');
                document.getElementById('t-ff-preview').classList.remove('hidden');
                document.getElementById('t-uid').disabled = true;
                btnCheck.classList.add('hidden');

                if (existingTarget) {
                    document.getElementById('t-existing-warning').classList.replace('hidden', 'flex');
                    document.getElementById('t-existing-view-btn').onclick = () => {
                        closeAddTargetModal();
                        viewGenericProfile(existingTarget.uid, "Existing Target");
                    };
                } else {
                    document.getElementById('add-modal-actions').classList.replace('hidden', 'flex');
                }
            } else {
                showPopup("UID Not Found", d.msg || "Free fire server api error.", "error");
                btnCheck.disabled = false;
                btnCheck.innerText = "Check Profile";
            }
        } catch(e) {
            loader.classList.add('hidden');
            console.error("DEBUG API ERROR DETAILS:", e);
            showPopup("API Network Error", `Could not retrieve data: ${e.message}`, "error");
            btnCheck.disabled = false;
            btnCheck.innerText = "Check Profile";
        }
    };

    window.submitTargetData = async function() {
        const uid = document.getElementById('t-uid').value.trim();
        const duration = document.getElementById('t-duration').value;
        const reason = document.getElementById('t-reason').value.trim();
        
        let actionsFooter = document.getElementById('add-modal-actions');
        actionsFooter.classList.replace('flex', 'hidden');

        try {
            let res = await fetch('/api/target/add', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({uid, duration, reason}) 
            });
            let data = await res.json();
            if (data.success) { 
                closeAddTargetModal();
                showPopup("Spam Active", data.msg || "Spam queue initiated successfully.", "success");
                if (typeof fetchTargets === 'function') {
                    fetchTargets(); 
                }
                if (typeof fetchDashboard === 'function') {
                    fetchDashboard();
                }
            } else {
                showPopup("Error Activating", data.msg, "error");
                actionsFooter.classList.replace('hidden', 'flex');
            }
        } catch(e) { 
            showPopup("Network Error", "Could not process request.", "error"); 
            actionsFooter.classList.replace('hidden', 'flex');
        }
    };
</script>
<!-- END OF FILE templates/sections/add_target_form.html -->
